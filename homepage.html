<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍍waveelab</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#87CEEB">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="waveelab">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22white%22/><text y=%22.9em%22 font-size=%2290%22>🍍</text></svg>">
    <style>
        /* 自动切换白天和黑夜模式的 CSS 变量 */
        :root {
            --bg-gradient: linear-gradient(to bottom, #ffffff, #87CEEB);
            --text-color: #333;
            --text-shadow: 0 1px 2px rgba(255,255,255,0.8);
            --window-bg: #ececec;
            --window-pinstripe: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.5) 2px, rgba(255,255,255,0.5) 4px);
            --title-bar: linear-gradient(to bottom, #fdfdfd, #c8c8c8);
            --dock-bg: rgba(255, 255, 255, 0.4);
            --dock-border: rgba(255, 255, 255, 0.6);
            --topbar-bg: rgba(255, 255, 255, 0.75);
            --topbar-border: rgba(0, 0, 0, 0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* 黑夜模式：黑色渐变低饱和深蓝色 */
                --bg-gradient: linear-gradient(to bottom, #000000, #1a2332);
                --text-color: #f0f0f0;
                --text-shadow: 0 1px 3px rgba(0,0,0,0.8);
                --window-bg: #2c2c2c;
                --window-pinstripe: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
                --title-bar: linear-gradient(to bottom, #555, #222);
                --dock-bg: rgba(0, 0, 0, 0.5);
                --dock-border: rgba(255, 255, 255, 0.2);
                --topbar-bg: rgba(0, 0, 0, 0.5);
                --topbar-border: rgba(255, 255, 255, 0.15);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; 
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* 顶部导航栏 (Menu Bar) */
        #top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 26px;
            background: var(--topbar-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--topbar-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            z-index: 1000;
        }

        #top-bar .left-menu {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 6px;
        }

        #top-bar .left-menu span.pineapple {
            filter: contrast(0%) brightness(50%); 
            font-size: 14px;
        }
        
        @media (prefers-color-scheme: dark) {
            #top-bar .left-menu span.pineapple {
                filter: contrast(0%) brightness(200%); 
            }
        }

        #top-bar .left-menu:active {
            opacity: 0.6;
        }

        /* 桌面图标区域 */
        #desktop {
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            height: calc(100vh - 120px);
            padding: 15px;
            margin-top: 26px; /* 避开顶部导航栏 */
            gap: 20px;
            align-content: flex-start;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 70px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .icon:active {
            transform: scale(0.9);
        }

        .icon-emoji {
            font-size: 40px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            margin-bottom: 5px;
        }

        .icon-name {
            font-size: 12px;
            color: var(--text-color);
            text-shadow: var(--text-shadow);
            text-align: center;
            word-wrap: break-word;
            width: 100%;
            font-weight: 500;
        }

        /* 窗口样式 (Aqua) */
        .window {
            position: absolute;
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            background-color: var(--window-bg);
            background-image: var(--window-pinstripe);
            border-radius: 8px 8px 0 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.2s ease, transform 0.2s ease, width 0.3s ease, height 0.3s ease, top 0.3s ease, left 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }

        .window.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .window.fullscreen {
            width: 100% !important;
            height: calc(100% - 26px) !important; 
            top: 26px !important;
            left: 0 !important;
            border-radius: 0;
            z-index: 1500 !important; /* 确保覆盖 Dock */
        }

        .window.minimized {
            opacity: 0;
            transform: scale(0.5) translateY(100vh);
            pointer-events: none;
        }

        .title-bar {
            height: 28px;
            background: var(--title-bar);
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid rgba(0,0,0,0.3);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            cursor: grab;
            position: relative;
        }

        .title-bar:active {
            cursor: grabbing;
        }

        .window.fullscreen .title-bar {
            border-radius: 0;
        }

        .controls {
            display: flex;
            gap: 6px;
            z-index: 2;
        }

        .btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: inset 0 -1px 1px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.8), 0 1px 1px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .btn-close { background: #FF5F56; border: 1px solid #E0443E; }
        .btn-minimize { background: #FFBD2E; border: 1px solid #DEA123; }
        .btn-maximize { background: #27C93F; border: 1px solid #1AAB29; }

        .window-title {
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
            pointer-events: none;
        }

        @media (prefers-color-scheme: dark) {
            .window-title {
                color: #ddd;
                text-shadow: 0 1px 0 rgba(0,0,0,0.5);
            }
        }

        .content {
            flex: 1;
            width: 100%;
            background: #fff;
            position: relative;
        }

        .content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Dock 栏 */
        #dock-container {
            position: fixed;
            bottom: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 999;
        }

        #dock {
            display: flex;
            gap: 15px;
            padding: 10px 20px;
            background: var(--dock-bg);
            border: 1px solid var(--dock-border);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 1px 1px rgba(255,255,255,0.4);
        }

        .dock-icon {
            font-size: 35px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            position: relative;
        }

        .dock-icon:hover, .dock-icon:active {
            transform: scale(1.3) translateY(-10px);
        }

        .dock-icon.open::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="left-menu" onclick="showDesktop()">
            <span class="pineapple">🍍</span>
            <span>waveelab</span>
        </div>
        <div class="right-menu" id="clock">00:00</div>
    </div>

    <div id="desktop"></div>

    <div id="dock-container">
        <div id="dock"></div>
    </div>

    <script>
        // ==========================================
        // 1. 系统时钟更新逻辑
        // ==========================================
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerText = `${hours}:${minutes} ${ampm}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ==========================================
        // 2. 独立的应用注册表 (区分桌面与Dock)
        // ==========================================
        
        // 桌面应用列表 (可无限添加)
        const desktopApps = [
            { id: 'facewavee', name: 'facewavee', emoji: '😊', url: '/tool/facewavee.html' },
            { id: 'exchanger', name: 'exchanger', emoji: '🪙', url: '/tool/exchanger.html' },
            { id: 'poemmaker', name: 'poemmaker', emoji: '🖋️', url: '/art/poemmaker.html' }
        ];

        // Dock应用列表 (固定四个)
        const dockApps = [
            { id: 'dock_files', name: 'Cloud', emoji: '☁️', url: 'https://jianguoyun.com' },
            { id: 'dock_safari', name: ' Gallery', emoji: '📔', url: 'https://koobone.com' },
            { id: 'dock_chat', name: 'Memo', emoji: '📝', url: 'memo.html' },
            { id: 'dock_spotify', name: 'Spotify', emoji: '🎧', url: '  https://open.spotify.com/playlist/11y9oywXcBJeTJzOukNs80?si=GkQhjYRuQMChD16OnaQI3g' }
        ];

        // 状态管理
        let highestZIndex = 10;
        const openWindows = {};

        const desktopEl = document.getElementById('desktop');
        const dockEl = document.getElementById('dock');

        // ==========================================
        // 3. 初始化桌面和 Dock
        // ==========================================
        function initOS() {
            // 生成桌面图标
            desktopApps.forEach(app => {
                const icon = document.createElement('div');
                icon.className = 'icon';
                icon.innerHTML = `
                    <div class="icon-emoji">${app.emoji}</div>
                    <div class="icon-name">${app.name}</div>
                `;
                icon.onclick = () => handleAppClick(app);
                desktopEl.appendChild(icon);
            });

            // 生成 Dock 图标
            dockApps.forEach(app => {
                const dockIcon = document.createElement('div');
                dockIcon.className = 'dock-icon';
                dockIcon.id = `dock-${app.id}`;
                dockIcon.innerText = app.emoji;
                dockIcon.onclick = () => handleAppClick(app);
                dockEl.appendChild(dockIcon);
            });
        }

        // ==========================================
        // 4. 窗口管理逻辑
        // ==========================================
        function handleAppClick(app) {
            const win = openWindows[app.id];
            if (win) {
                win.classList.remove('minimized');
                bringToFront(win);
            } else {
                openApp(app);
            }
        }

        function showDesktop() {
            Object.values(openWindows).forEach(win => {
                win.classList.add('minimized');
            });
        }

        function openApp(app) {
            const win = document.createElement('div');
            win.className = 'window';
            win.id = `win-${app.id}`;
            
            win.innerHTML = `
                <div class="title-bar" id="title-${app.id}">
                    <div class="controls">
                        <div class="btn btn-close" onclick="closeApp('${app.id}', event)"></div>
                        <div class="btn btn-minimize" onclick="minimizeApp('${app.id}', event)"></div>
                        <div class="btn btn-maximize" onclick="toggleFullscreen('${app.id}', event)"></div>
                    </div>
                    <div class="window-title">${app.name}</div>
                </div>
                <div class="content">
                    <iframe src="${app.url}"></iframe>
                    <div class="iframe-shield" style="position:absolute; top:0; left:0; width:100%; height:100%; display:none; z-index:5;"></div>
                </div>
            `;

            document.body.appendChild(win);
            openWindows[app.id] = win;
            
            requestAnimationFrame(() => {
                win.classList.add('active');
                bringToFront(win);
            });

            makeDraggable(win, document.getElementById(`title-${app.id}`));
            
            win.addEventListener('mousedown', () => bringToFront(win));
            win.addEventListener('touchstart', () => bringToFront(win), {passive: true});

            updateDockStatus(app.id, true);
        }

        function closeApp(appId, e) {
            e.stopPropagation();
            const win = openWindows[appId];
            if (win) {
                win.classList.remove('active');
                setTimeout(() => {
                    win.remove();
                    delete openWindows[appId];
                    updateDockStatus(appId, false);
                }, 200);
            }
        }

        function minimizeApp(appId, e) {
            e.stopPropagation();
            const win = openWindows[appId];
            if (win) {
                win.classList.add('minimized');
            }
        }

        function toggleFullscreen(appId, e) {
            e.stopPropagation();
            const win = openWindows[appId];
            if (win) {
                win.classList.toggle('fullscreen');
                if (!win.classList.contains('fullscreen')) {
                    win.style.top = '10%';
                    win.style.left = '10%';
                } else {
                    bringToFront(win); 
                }
            }
        }

        function bringToFront(win) {
            highestZIndex++;
            win.style.zIndex = highestZIndex;
        }

        function updateDockStatus(appId, isOpen) {
            const dockIcon = document.getElementById(`dock-${appId}`);
            if (dockIcon) {
                if (isOpen) dockIcon.classList.add('open');
                else dockIcon.classList.remove('open');
            }
        }

        // ==========================================
        // 5. 拖拽逻辑 
        // ==========================================
        function makeDraggable(win, titleBar) {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;
            const shield = win.querySelector('.iframe-shield');

            titleBar.addEventListener('touchstart', dragStart, {passive: false});
            document.addEventListener('touchmove', drag, {passive: false});
            document.addEventListener('touchend', dragEnd);

            titleBar.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', dragEnd);

            function dragStart(e) {
                if (e.target.classList.contains('btn')) return; 
                if (win.classList.contains('fullscreen')) return;

                isDragging = true;
                shield.style.display = 'block'; 

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                startX = clientX;
                startY = clientY;
                
                const rect = win.getBoundingClientRect();
                initialLeft = rect.left;
                initialTop = rect.top;

                win.style.transition = 'none';
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault(); 

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                const dx = clientX - startX;
                const dy = clientY - startY;

                win.style.left = `${initialLeft + dx}px`;
                win.style.top = `${initialTop + dy}px`;
            }

            function dragEnd() {
                if (!isDragging) return;
                isDragging = false;
                shield.style.display = 'none';
                win.style.transition = 'opacity 0.2s ease, transform 0.2s ease, width 0.3s ease, height 0.3s ease';
            }
        }

        // 启动系统
        initOS();

        // ==========================================
        // 6. PWA Service Worker 注册逻辑
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker 注册成功，作用域为: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker 注册失败: ', err);
                    });
            });
        }
    </script>
</body>
</html>
    </script>
</body>
